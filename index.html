        <!-- CORE STYLESHEET -->
        <style>
            :root {
                --ease-expo: cubic-bezier(0.19, 1, 0.22, 1);
                
                /* DEFAULT THEME (Cyan/Obsidian) */
                --bg-app: #020617;
                --bg-panel: #0f172a;
                --bg-card: #1e293b;
                --bg-glass: rgba(15, 23, 42, 0.65);
                --bg-input: #1e293b;
                
                --text-main: #ffffff;
                --text-muted: #94a3b8;
                --text-dim: #64748b;
                
                --border-dim: #334155;
                
                --accent-primary: #06b6d4;
            }

            body { background-color: var(--bg-app); color: var(--text-muted); overflow: hidden; -webkit-tap-highlight-color: transparent; user-select: none; transition: background-color 0.5s ease, color 0.3s ease; }
            
            /* Custom Scrollbar */
            .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
            .custom-scroll::-webkit-scrollbar-track { background: transparent; }
            .custom-scroll::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 4px; }
            .hide-scroll::-webkit-scrollbar { display: none; }
            .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

            /* Glassmorphism System */
            .glass-card {
                background: var(--bg-glass);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                border: 1px solid rgba(255, 255, 255, 0.08);
                box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
                transition: background 0.3s, border 0.3s, box-shadow 0.3s;
            }
            .glass-card:active { background: var(--bg-panel); }

            /* Button Interactions */
            .btn-action { position: relative; overflow: hidden; transition: all 0.3s var(--ease-expo); }
            .btn-action::after {
                content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
                background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
                transition: 0.5s;
            }
            .btn-action:hover::after { left: 100%; }
            .btn-action:active { transform: scale(0.96); }

        /* TIER VISUAL SYSTEM (ULTIMATE PROGRESSION) */
            
            /* 1. TIER PEMULA (Flat / Matte) */
            .tier-f { color: #525252; font-weight: 600; filter: grayscale(100%); }
            .tier-e { color: #8D6E63; font-weight: 600; }
            .tier-d { color: #558B2F; font-weight: 600; }
            .tier-c { color: #00897B; font-weight: 700; }

            /* 2. TIER MENENGAH (Sedikit Glow) */
            .tier-b { color: #1E88E5; font-weight: 700; text-shadow: 0 0 5px rgba(30, 136, 229, 0.4); }
            .tier-a { color: #3949AB; font-weight: 800; text-shadow: 0 0 8px rgba(57, 73, 171, 0.5); }
            .tier-s { color: #7E57C2; font-weight: 800; text-shadow: 0 0 10px rgba(126, 87, 194, 0.6); }

            /* 3. TIER ELITE (Radiant / Bersinar) */
            .tier-ss { 
                color: #D81B60; 
                text-shadow: 0 0 10px #D81B60, 0 0 20px rgba(216, 27, 96, 0.4); 
            }
            .tier-ex { 
                background: linear-gradient(135deg, #FFD700 20%, #FDB931 50%, #FFD700 80%);
                -webkit-background-clip: text; -webkit-text-fill-color: transparent;
                filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.6));
            }
            .tier-mr { 
                color: #FF6D00; 
                text-shadow: 0 0 10px #FF6D00, 0 0 20px rgba(255, 109, 0, 0.5);
                animation: pulse-slow 3s infinite alternate;
            }

            /* 4. TIER LEGENDARY (Electric / Anomaly) */
            .tier-ur { 
                color: #00E5FF; 
                text-shadow: 0 0 5px #fff, 0 0 15px #00E5FF, 0 0 30px #00E5FF; 
                animation: glow 2s infinite alternate;
            }
            .tier-exr { 
                color: #FF1744; 
                text-shadow: 0 0 5px #fff, 0 0 15px #FF1744, 0 0 30px #D50000;
                letter-spacing: 1px;
            }

            /* 5. TIER GOD (Animated / Living) */
            .tier-hs { 
                background: linear-gradient(to bottom, #FF3D00, #FFEA00); 
                -webkit-background-clip: text; -webkit-text-fill-color: transparent;
                filter: drop-shadow(0 0 10px #FF3D00);
                animation: shimmer 2s infinite linear;
            }
            .tier-ps { 
                color: #FFFFFF; 
                text-shadow: 0 0 10px #FFFFFF, 0 0 20px #FFFFFF, 0 0 40px #B3E5FC;
                animation: float 4s ease-in-out infinite;
            }
            
        /* MA - MAXIMUM: ELEGANT DARK AURA */
            .tier-max { 
                color: #050505; /* Teks warna hitam pekat */
                /* Outline putih dan glow silver/putih terang agar kontras */
                text-shadow: 
                    -1px -1px 0 #e2e8f0,  
                    1px -1px 0 #e2e8f0,

                    0 0 30px rgba(255, 255, 255, 0.5);

                letter-spacing: 2px;
                animation: pulse-slow 3s infinite alternate;
            }
            /* Hapus @keyframes holo-shift karena sudah tidak dipakai */

            @keyframes holo-shift {

            /* Navigation Dock */
            .nav-dock {
                background: var(--bg-panel);

                border-top: 1px solid rgba(255,255,255,0.08);
                box-shadow: 0 -4px 20px rgba(0,0,0,0.4);

            .nav-item.active .nav-icon { filter: drop-shadow(0 4px 8px rgba(var(--accent-primary),0.4)); stroke-width: 2.5px; }
            .nav-indicator { width: 4px; height: 4px; background: var(--accent-primary); border-radius: 50%; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%) scale(0); transition: transform 0.3s; box-shadow: 0 0 8px var(--accent-primary); }
            .nav-item.active .nav-indicator { transform: translateX(-50%) scale(1); }

            /* Toast & Overlays */
            #toast-layer { position: fixed; top: 20px; left: 0; right: 0; pointer-events: none; z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 10px; }
            .toast-msg { background: var(--bg-panel); backdrop-filter: blur(8px); padding: 12px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: translateY(-20px); opacity: 0; animation: toastEnter 0.4s forwards; }
            @keyframes toastEnter { to { transform: translateY(0); opacity: 1; } }
            @keyframes toastExit { to { transform: translateY(-20px); opacity: 0; } }

            /* Calendar Grid */
            .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
            .cal-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 10px; font-weight: bold; border: 1px solid transparent; transition: all 0.2s; position: relative; }
            .cal-cell.active { background: rgba(6,182,212,0.15); border-color: rgba(6,182,212,0.5); color: #fff; }
            .cal-cell:hover { background: rgba(255,255,255,0.05); }

            /* Particle Canvas */
            #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; opacity: 0.3; }
            .ambient-layer { position: fixed; inset: 0; pointer-events: none; z-index: 0; background: radial-gradient(circle at 0% 0%, rgba(6,182,212,0.05) 0%, transparent 50%), radial-gradient(circle at 100% 100%, rgba(139,92,246,0.05) 0%, transparent 50%); }
        </style>

            class Utils {
                static generateId() { 
                    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                        var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                        return v.toString(16);
                    });
                }
                static getISO(d = new Date()) {
                    const y = d.getFullYear();
                    const m = String(d.getMonth()+1).padStart(2,'0');
                    const day = String(d.getDate()).padStart(2,'0');
                    return `${y}-${m}-${day}`;
                }
                static getTomorrow() { 
                    const d = new Date(); d.setDate(d.getDate()+1); 
                    return this.getISO(d); 
                }
                static getMonthKey(iso) {
                    return iso.slice(0, 7);
                }
                static formatMonth(iso) { 
                    const [y,m]=iso.split('-'); 
                    return new Date(y,parseInt(m)-1).toLocaleDateString('id-ID',{month:'long',year:'numeric'}).toUpperCase(); 
                }
                static formatDate(iso) { 
                    return new Date(iso).toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); 
                }
                static formatCurrency(n) { 
                    return new Intl.NumberFormat('id-ID').format(n); 
                }
                static getCurrentSlot() {
                    const h = new Date().getHours();
                    return Config.TIME_SLOTS.find(s => s.id !== 'all' && h >= s.start && h < s.end) || Config.TIME_SLOTS[0];
                }
                static getCurrentSlot() {
                    const h = new Date().getHours();
                    return Config.TIME_SLOTS.find(s => s.id !== 'all' && h >= s.start && h < s.end) || Config.TIME_SLOTS[0];
                }
                
                // 👉 TAMBAHAN BARU: Format interval 30 menit
                static formatTimeSlot(index) {
                    const h = Math.floor(index / 2);
                    const m = index % 2 === 0 ? '00' : '30';
                    return `${String(h).padStart(2, '0')}:${m}`;
                }

                // 👉 TAMBAHAN BARU: Ambil index waktu saat ini (0-48)
                static getCurrentTimeIndex() {
                    const now = new Date();
                    return now.getHours() * 2 + (now.getMinutes() >= 30 ? 1 : 0);
                }
            }

        /**
             * MODULE 3: DATA SERVICES (INDEXEDDB MODEL)
             */
            class Store {
                static dbName = 'WakeMap_DB';
                static dbVersion = 1;
                static storeName = 'app_data';
                static db = null;

                // 1. Inisialisasi Database
                static initDB() {
                    return new Promise((resolve, reject) => {
                        const request = indexedDB.open(this.dbName, this.dbVersion);
                        request.onupgradeneeded = (e) => {
                            const db = e.target.result;
                            if (!db.objectStoreNames.contains(this.storeName)) {
                                db.createObjectStore(this.storeName);
                            }
                        };
                        request.onsuccess = (e) => {
                            this.db = e.target.result;
                            resolve(this.db);
                        };
                        request.onerror = (e) => reject(e.target.error);
                    });
                }

                // 2. Mengambil Data (Sekarang Asynchronous)
                static async get(key) {
                    if (!this.db) await this.initDB();
                    return new Promise((resolve, reject) => {
                        const tx = this.db.transaction(this.storeName, 'readonly');
                        const store = tx.objectStore(this.storeName);
                        const request = store.get(key);
                        
                        request.onsuccess = () => {
                            const data = request.result;
                            if (key === 'settings') resolve(data || { muted: false, theme: 'default' });
                            else resolve(data || []);
                        };
                        request.onerror = () => reject(request.error);
                    });
                }

                // 3. Menyimpan Data (Sekarang Asynchronous)
                static async set(key, data) {
                    if (!this.db) await this.initDB();
                    return new Promise((resolve, reject) => {
                        const tx = this.db.transaction(this.storeName, 'readwrite');
                        const store = tx.objectStore(this.storeName);
                        const request = store.put(data, key);
                        request.onsuccess = () => resolve();
                        request.onerror = () => reject(request.error);
                    });
                }

                // 4. Prune / Bersih-bersih data lama
                static async prune(years) {
                    const now = new Date();
                    now.setFullYear(now.getFullYear() - years);
                    const limitDate = Utils.getISO(now);
                    const limitMonth = limitDate.slice(0, 7);

                    // --- BAGIAN INI DIMODIFIKASI UNTUK SELAMATKAN POIN ---
                    let tasks = await this.get('tasks');
                    const tCount = tasks.length;
                    
                    // 1. Ambil task tua yang akan dihapus
                    const tasksToDelete = tasks.filter(t => t.date < limitDate);
                    const tasksToKeep = tasks.filter(t => t.date >= limitDate);
                    
                    if (tasksToDelete.length > 0) {
                        // 2. Hitung poin dari task yang mau dihapus
                        const pointsToArchive = tasksToDelete.reduce((acc, t) => {
                            return acc + (t.status === 'completed' ? (Config.DIFFICULTY[t.difficulty]?.pts || 0) : 0);
                        }, 0);

                        // 3. Simpan poin itu ke 'archived_points' di Settings
                        const settings = await this.get('settings');
                        settings.archivedPoints = (settings.archivedPoints || 0) + pointsToArchive;
                        await this.set('settings', settings);

                        // 4. Baru hapus task-nya
                        await this.set('tasks', tasksToKeep);
                        console.log(`Pruned: ${tasksToDelete.length} tasks. Archived Points: ${pointsToArchive}`);
                    }
                }
            }

            class SoundEngine {
                            constructor() {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    this.muted = false; // Set default dulu
                    this.loadSettings(); // Panggil fungsi async terpisah
                }
                async loadSettings() {
                    const settings = await Store.get('settings');
                    this.muted = settings ? settings.muted : false;
                }

                async setMuted(val) {
                    this.muted = val;
                    const currentSettings = await Store.get('settings');
                    await Store.set('settings', { ...currentSettings, muted: val });
                }

                play(type) {
                    if (this.muted) return;
                    if (this.ctx.state === 'suspended') this.ctx.resume();

                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);

                    const now = this.ctx.currentTime;

                    if (type === 'click') {
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(800, now);
                        osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
                        
                        // --- PERBAIKAN DI SINI ---
                        // Tadinya 0.1 (10%), ganti jadi 0.5 (50%) supaya "tek" nya kedengeran mantap
                        gain.gain.setValueAtTime(0.5, now); 
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                        
                        osc.start(now);
                        osc.stop(now + 0.1);

                    } else if (type === 'success') {
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(440, now); 
                        osc.frequency.setValueAtTime(554, now + 0.1); 
                        osc.frequency.setValueAtTime(659, now + 0.2); 
                        
                        // --- PERBAIKAN DI SINI ---
                        // Tadinya 0.1, naikkan jadi 0.4 supaya bunyi "ting!" jelas
                        gain.gain.setValueAtTime(0.4, now);
                        gain.gain.linearRampToValueAtTime(0, now + 0.4);
                        
                        osc.start(now);
                        osc.stop(now + 0.4);

                    } else if (type === 'error') {
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(150, now);
                        osc.frequency.linearRampToValueAtTime(50, now + 0.3);
                        
                        // --- PERBAIKAN DI SINI ---
                        // Tadinya 0.1, naikkan jadi 0.4 supaya bunyi "tetot" jelas
                        gain.gain.setValueAtTime(0.4, now);
                        gain.gain.linearRampToValueAtTime(0, now + 0.3);
                        
                        osc.start(now);
                        osc.stop(now + 0.3);

                    } else if (type === 'nav') {
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(600, now);
                        
                        // --- PERBAIKAN DI SINI ---
                        // Tadinya 0.05 (kecil banget), naikkan jadi 0.2
                        gain.gain.setValueAtTime(0.2, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                        
                        osc.start(now);
                        osc.stop(now + 0.05);
                    }
                }
            }

        /**

            class Engine {
                // [UPDATE] Logika Sorting Cerdas (Chronological)
                static sortTasks(tasks) {
                    return tasks.sort((a, b) => {
                        // Helper untuk menentukan "Bobot Waktu"
                        const getWeight = (t) => {
                            // 1. ALL DAY selalu paling bawah (Bobot Besar)
                            if (t.timeSlot === 'all') return 100;

                            // 2. Cek apakah pakai Custom Range (Sistem Baru)
                            if (t.customStart !== undefined && t.customStart !== null) {
                                return t.customStart;
                            }

                            // 3. Cek Slot ID (h0, h1, ... h23)
                            if (t.timeSlot && t.timeSlot.startsWith('h')) {
                                return parseInt(t.timeSlot.replace('h', ''));
                            }

                            // 4. Fallback untuk data legacy (jika ada)
                            const slot = Config.TIME_SLOTS.find(s => s.id === t.timeSlot);
                            return slot ? slot.start : 99;
                        };

                        const wA = getWeight(a);
                        const wB = getWeight(b);

                        // Jika jamnya sama, urutkan berdasarkan waktu pembuatan (yang duluan dibuat di atas)
                        if (wA === wB) {
                            return new Date(a.createdAt) - new Date(b.createdAt);
                        }

                        return wA - wB; // Kecil (Pagi) ke Besar (Malam)
                    });
                }

                // Updated Calc Expense Logic
                static calcExpense(monthKey, rewards) {
                    if (!rewards || rewards.length === 0) return 0;
                    return rewards.filter(r => r.status === 'redeemed' && r.redeemedDate && r.redeemedDate.startsWith(monthKey))
                                .reduce((acc, r) => acc + (r.cost || 0), 0);
                }

    static async calcPoints(tasks) {
                    const dObj = new Date();
                    const today = Utils.getISO(dObj);
                    const monthKey = today.slice(0, 7); // Bulan Ini (Contoh: "2026-03")
                    
                    // 👉 [FIX] Cegah Bug Kalender Javascript (Rollover Februari)
                    // Mundurin ke tanggal 1 dulu, baru kurangi bulannya biar aman 100%
                    const dPrev = new Date(dObj.getFullYear(), dObj.getMonth() - 1, 1);
                    const prevMonthKey = Utils.getISO(dPrev).slice(0, 7); // Bulan Lalu (Contoh: "2026-02")
                    
                    const settings = await Store.get('settings');
                    const archived = settings.archivedPoints || 0;

                    let cur = 0, mon = 0, last = 0;
                    let total = archived; 

                    tasks.forEach(t => {
                        const pts = t.pts !== undefined ? t.pts : (Config.DIFFICULTY[t.difficulty]?.pts || 0);
                        
                        if (t.status === 'completed') {
                            total += pts; 
                            if (t.date === today) cur += pts;
                            if (t.date.startsWith(monthKey)) mon += pts;
                            if (t.date.startsWith(prevMonthKey)) last += pts;
                        } 
                        else if (t.status === 'failed') {
                            total -= pts;
                            if (t.date === today) cur -= pts;
                            if (t.date.startsWith(monthKey)) mon -= pts;
                            if (t.date.startsWith(prevMonthKey)) last -= pts;
                        }
                    });

                    const dayNum = dObj.getDate();
                    const avg = dayNum > 0 ? (mon / dayNum).toFixed(1) : '0.0';

                    return { cur, mon, last, avg, total };
                }
                // [FITUR BARU] Sistem Pajak Mingguan (5% dari saldo)
              // [FITUR BARU] Sistem Pajak Mingguan (Hardcore Mode)
            static async applyTax(tasks, rewards, settings) {
                const now = new Date();
                const today = Utils.getISO(now);
                
                if (!settings.lastTaxDate) {
                    settings.lastTaxDate = today;
                    await Store.set('settings', settings);
                    return false;
                }
                
                const lastDate = new Date(settings.lastTaxDate);
                const diffDays = Math.ceil(Math.abs(now - lastDate) / (1000 * 60 * 60 * 24));
                
                if (diffDays >= 7) {
                    const { total } = await this.calcPoints(tasks);
                    const allRedeemed = rewards.filter(r => r.status === 'redeemed');
                    const totalSpent = allRedeemed.reduce((acc, r) => acc + (r.cost || 0), 0) + (settings.archivedSpent || 0);
                    const balance = total - totalSpent;
                    // 👉 LOGIKA PAJAK BARU (Aman buat pengguna baru)
                    let taxAmount = 0;
                    let taxName = '';
                    
                    if (balance > 0) {
                        taxAmount = Math.ceil(balance * 0.05); // Pajak 5% dari kekayaan
                        taxName = 'Pajak Ekosistem (5%)';
                    } else if (balance < 0) {
                        taxAmount = 15; // HANYA dipotong kalau saldo emang udah MINUS (Utang)
                        taxName = 'Pajak Minimum Ekosistem';
                    } else {
                        // Kalau saldonya PAS 0 (Baru mulai), JANGAN DIPAJAK!
                        taxAmount = 0; 
                    }

                    // Tembak langsung ke keranjang pengeluaran
                    if (taxAmount > 0) {
                        rewards.push({
                            id: Utils.generateId(),
                            name: taxName,
                            cost: taxAmount,
                            price: 0,
                            status: 'redeemed', 
                            redeemedDate: today
                        });
                        await Store.set('rewards', rewards);
                    }
                    
                    settings.lastTaxDate = today;
                    await Store.set('settings', settings);
                    return true;
                }
                return false;
            }
                
            static async calcRank(monthKey, tasks, financeData) {
                    const today = Utils.getISO();
                    const mTasks = tasks.filter(t => 
                        t.date.startsWith(monthKey) && 
                        t.date <= today && 
                        t.type !== 'bonus'
                    );
                    
                    const config = financeData.find(f => f.month === monthKey);
                    const dailyTarget = config ? config.targetPts : 10;

                    const dates = [...new Set(mTasks.map(t => t.date))].sort();
                    
                    let eWins = 0;
                    let cWins = 0;
                    const restDays = await Store.get('restDays') || [];

                    dates.forEach(d => {
                        // Kalau hari itu Hibernasi, Rank Otomatis Naik/Aman
                        if (restDays.includes(d)) {
                            eWins++; cWins++; 
                            return;
                        }
                        const ts = mTasks.filter(t => t.date === d);
                        const done = ts.filter(t => t.status === 'completed').length;
                        const total = ts.length;
                        
                        // [FIX] Menggunakan '?.' (Optional Chaining) agar tidak crash jika data lama korup
                        const dayPoints = ts.reduce((acc, t) => acc + (t.status === 'completed' ? (Config.DIFFICULTY[t.difficulty]?.pts || 0) : 0), 0);

                        if (done === total && total > 0) eWins++;
                        if (dayPoints >= dailyTarget) cWins++;
                    });

                    const maxTier = Config.TIERS.length - 1;
                    
                    // [FIX] Proteksi tambahan agar indeks Tier tidak menjadi NaN / Error
                    let eTierIndex = Math.floor(eWins / 4);
                    if (isNaN(eTierIndex) || eTierIndex < 0) eTierIndex = 0;
                    if (eTierIndex > maxTier) eTierIndex = maxTier;
                    let eBars = Math.ceil((eWins % 4) / 2); 
                    if (eTierIndex === maxTier) eBars = 2;

                    let cTierIndex = Math.floor(cWins / 4);
                    if (isNaN(cTierIndex) || cTierIndex < 0) cTierIndex = 0;
                    if (cTierIndex > maxTier) cTierIndex = maxTier;
                    let cBars = Math.ceil((cWins % 4) / 2);
                    if (cTierIndex === maxTier) cBars = 2;

                    return { 
                        exec: { tier: Config.TIERS[eTierIndex] || Config.TIERS[0], bars: eBars || 0 }, 
                        cons: { tier: Config.TIERS[cTierIndex] || Config.TIERS[0], bars: cBars || 0 },
                        dailyTarget: dailyTarget
                    };
                }

                static async checkAutoFail(tasks) {
                const now = new Date();
                const today = Utils.getISO(now);
                // 👉 UBAH BARIS INI:
                const currentTimeIdx = Utils.getCurrentTimeIndex(); 
                let hasChange = false;

                const restDays = await Store.get('restDays') || [];

                tasks.forEach(task => {
                    if (task.type === 'bonus') return;
                    if (task.date === today && restDays.includes(today)) return;

                    if (task.status === 'pending') {
                        if (task.date < today) {
                            task.status = 'failed'; hasChange = true;
                        } 
                        else if (task.date === today) {
                            let endTime = 48; // 👉 UBAH DARI 24 JADI 48 (Sistem Baru)

                            if (task.customEnd !== undefined) {
                                endTime = task.customEnd;
                            } else {
                                const slot = Config.TIME_SLOTS.find(s => s.id === (task.timeSlot||'all'));
                                if(slot && slot.id !== 'all') endTime = slot.end * 2; // konversi data lama kalau ada
                            }

                            // 👉 UBAH h JADI currentTimeIdx
                            if (currentTimeIdx >= endTime) {
                                task.status = 'failed';
                                hasChange = true;
                            }
                        }
                    }
                });
                return hasChange;
            }
               // 👉 FITUR BARU: Evaluasi Performa (Rapel Denda Kemalasan Anti-Kabur)
            static async evaluateYesterday(tasks, rewards, financeData, settings) {
                if (!settings.hasStarted) return false;
                const today = new Date();
                today.setHours(0,0,0,0); // Normalisasi ke tengah malam
                const tISO = Utils.getISO(today);

                if (!settings.lastEvaluatedDay) {
                    settings.lastEvaluatedDay = tISO; 
                    await Store.set('settings', settings);
                    return false;
                }

                if (settings.lastEvaluatedDay >= tISO) return false; // Udah dievaluasi hari ini

                const restDays = await Store.get('restDays') || [];
                let totalTaxApplied = 0;

                // Loop dari hari setelah lastEvaluatedDay sampai H-1 (Kemarin)
                let evalDate = new Date(settings.lastEvaluatedDay);
                evalDate.setDate(evalDate.getDate() + 1);

                while (evalDate < today) {
                    const eISO = Utils.getISO(evalDate);
                    
                    // Kalau hari itu dia beli tiket Hibernasi, aman (bebas pajak)
                    if (!restDays.includes(eISO)) {
                        // 1. Hitung poin di hari tersebut
                        const dayTasks = tasks.filter(t => t.date === eISO && t.status === 'completed');
                        const dayPointsEarned = dayTasks.reduce((acc, t) => acc + (t.pts !== undefined ? t.pts : (Config.DIFFICULTY[t.difficulty]?.pts || 0)), 0);

                        // 2. Target di bulan tersebut
                        const monthKey = eISO.slice(0, 7);
                        const myFinance = financeData.find(f => f.month === monthKey);
                        const dailyTarget = myFinance ? myFinance.targetPts : 24; 

                        // 3. Eksekusi Pajak Kemalasan (< 20% target)
                        const minimumEffort = dailyTarget * 0.20; 
                        
                        if (dayPointsEarned < minimumEffort) {
                            const lazinessTax = Math.ceil(dailyTarget * 0.50); 
                            totalTaxApplied += lazinessTax;
                            
                            rewards.push({
                                id: Utils.generateId(), name: `Pinalti Kemalasan (${eISO})`, cost: lazinessTax, price: 0, status: 'redeemed', redeemedDate: tISO
                            });
                        }
                    }
                    evalDate.setDate(evalDate.getDate() + 1); // Lanjut ke hari berikutnya
                }

                // Update tanggal evaluasi terakhir ke hari ini (biar besok baru ngecek lagi)
                settings.lastEvaluatedDay = tISO;
                
                if (totalTaxApplied > 0) {
                    await Store.set('rewards', rewards);
                    await Store.set('settings', settings);
                    return totalTaxApplied; // Return total denda rapelan
                }
                
                await Store.set('settings', settings);
                return false;
            }
            }

            /**

            class VFXEngine {
                constructor() {
                    this.canvas = document.getElementById('particle-canvas');
                    this.ctx = this.canvas.getContext('2d');
                    this.width = window.innerWidth;
                    this.height = window.innerHeight;
                    this.particles = [];
                    this.init();
                }

                init() {
                    this.resize();
                    window.addEventListener('resize', () => this.resize());
                    for(let i=0; i<40; i++) this.particles.push(this.createParticle());
                    this.animate();
                }

                resize() {
                    this.width = this.canvas.width = window.innerWidth;
                    this.height = this.canvas.height = window.innerHeight;
                }

                createParticle() {
                    return {
                        x: Math.random() * this.width,
                        y: Math.random() * this.height,
                        vx: (Math.random() - 0.5) * 0.3,
                        vy: (Math.random() - 0.5) * 0.3,
                        size: Math.random() * 2,
                        alpha: Math.random() * 0.5
                    };
                }

                animate() {
                    this.ctx.clearRect(0, 0, this.width, this.height);
                    this.particles.forEach(p => {
                        p.x += p.vx;
                        p.y += p.vy;
                        if(p.x < 0) p.x = this.width;
                        if(p.x > this.width) p.x = 0;
                        if(p.y < 0) p.y = this.height;
                        if(p.y > this.height) p.y = 0;
                        
                        // Dynamic Particle Color
                        const accentColor = getComputedStyle(document.body).getPropertyValue('--accent-primary').trim();
                        this.ctx.fillStyle = accentColor || 'rgba(6, 182, 212, 0.5)'; 
                        this.ctx.globalAlpha = p.alpha;
                        
                        this.ctx.beginPath();
                        this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        this.ctx.fill();
                        this.ctx.globalAlpha = 1.0;
                    });
                    requestAnimationFrame(() => this.animate());
                }
            }

            async generateLoopTasks() {

                if (!text) { this.toast("Nama misi wajib diisi!", "error"); return; }
                if (!endDateStr) { this.toast("Pilih Tanggal Berakhir!", "error"); return; }
                if (selectedDays.length === 0) { this.toast("Pilih minimal satu hari!", "error"); return; }
                if (end <= start) { this.toast("Jam selesai harus lebih besar!", "error"); return; }

                const endDate = new Date(endDateStr);
                endDate.setHours(23, 59, 59, 999);
                
                let d = new Date(); 
                d.setDate(d.getDate() + 1); // Mulai besok
                d.setHours(0,0,0,0);

                // Pre-calculate total loop for indexing
                let total = 0;
                let tempD = new Date(d);
                while(tempD <= endDate) {
                    if (selectedDays.includes(tempD.getDay())) total++;
                    tempD.setDate(tempD.getDate() + 1);
                }

                if (total === 0) { this.toast("Tidak ada hari yang cocok hingga tanggal tersebut!", "error"); return; }

                const tasks = await Store.get('tasks');
                let createdCount = 0;
                
                const basePts = Config.DIFFICULTY[diff].pts;
                const timeLabel = `${Utils.formatTimeSlot(start)} - ${Utils.formatTimeSlot(end)}`;
                const seriesId = Utils.generateId(); 

                while (d <= endDate) {
                    const currentDayIndex = d.getDay();

                    if (selectedDays.includes(currentDayIndex)) {
                        const isLast = (createdCount === total - 1);
                        let finalPts = undefined; 
                        let isJackpot = false;
                        
                        if (isLast && bonusPts > 0) {
                            finalPts = basePts + bonusPts;
                            isJackpot = true;
                        }

                        tasks.push({
                            id: Utils.generateId(),
                            loopSeriesId: seriesId, 
                            isLoop: true,
                            loopIndex: createdCount + 1,
                            loopTotal: total,
                            isJackpot: isJackpot,
                            text: text, 
                            difficulty: diff,
                            timeSlot: 'custom',
                            customStart: start,
                            customEnd: end,
                            customLabel: timeLabel,
                            date: Utils.getISO(d),
                            status: 'pending',

                            pts: finalPts 
                        });

            // --- UPDATED NOTIFICATION SYSTEM ---
                requestPermission() {
                    if (!("Notification" in window)) {
                        this.toast("Browser ini tidak support notifikasi sistem.", "error");
                        return;
                    }

                    // Minta izin
                    Notification.requestPermission().then(permission => {

            async checkNotifications(tasks) {
                    // 1. Cek Izin
                    if (!("Notification" in window) || Notification.permission !== "granted") return;

                    const now = new Date();
                    const currentHour = now.getHours();
                    const today = Utils.getISO();
                    
                    // Key Unik: Tanggal + Jam (Contoh: "2024-10-27-h10")
                    // Ini kuncinya agar notifikasi hanya bunyi 1x per jam (tidak spam)
                    const currentNotifKey = `${today}-h${currentHour}`;

                    // --- BAGIAN 1: NOTIFIKASI MISI (TIME BASED) ---
                    // Hanya jalankan jika jam ini BELUM dinotifikasi
                    if (this.state.notifiedTracker.slot !== currentNotifKey) {
                        
                        // A. Cari Misi yang MULAI jam ini (Start Hour == Current Hour)
                        const slotTasks = tasks.filter(t => {
                            // Filter dasar: Harus hari ini & belum selesai
                            if (t.date !== today || t.status !== 'pending') return false;
                            if (t.timeSlot === 'all') return false; // All day dipisah

                            // LOGIKA BARU: Cek Angka Jam Mulai
                            let startHour = -1;
                            
                            // Cek apakah pakai Custom Range (Misi Loop/Manual Baru)
                            if (t.customStart !== undefined && t.customStart !== null) {
                                startHour = t.customStart;
                            } 
                            // Cek apakah pakai Slot ID Lama (Data Lama)
                            else {
                                const slot = Config.TIME_SLOTS.find(s => s.id === t.timeSlot);
                                if (slot) startHour = slot.start;
                            }

                            // Jika Jam Mulai == Jam Sekarang, maka Notif!
                            return startHour === currentHour;
                        });

                        // B. Cari Misi All Day (Hanya muncul sekali sehari)
                        const allDayTasks = tasks.filter(t => 
                            t.date === today && t.status === 'pending' && t.timeSlot === 'all'
                        );

                        let notifBody = [];
                        let notifTitle = "";

                        // Masukkan Misi Jam Ini ke Body Notif
                        if (slotTasks.length > 0) {
                            notifTitle = `⚡ FASE JAM ${String(currentHour).padStart(2,'0')}:00`;
                            slotTasks.forEach(t => notifBody.push(`• ${t.text}`));
                        }

                        // Logika All Day: Hanya muncul jika ini adalah notifikasi PERTAMA hari ini
                        // (Cek apakah tracker sebelumnya bukan tanggal hari ini)
                        const lastNotifDate = this.state.notifiedTracker.slot ? this.state.notifiedTracker.slot.split('-h')[0] : '';
                        
                        if (allDayTasks.length > 0 && lastNotifDate !== today) {
                            if (!notifTitle) notifTitle = "📅 MISI HARIAN";
                            allDayTasks.forEach(t => notifBody.push(`• [ALL] ${t.text}`));
                        }

                        // EKSEKUSI: Tampilkan Notif jika ada isinya
                        if (notifBody.length > 0) {
                            this.showNotification(notifTitle, notifBody.join("\n"));
                            this.sound.play('nav'); // Bunyi efek
                        }

                        // KUNCI: Update tracker agar jam ini tidak bunyi lagi
                        this.state.notifiedTracker.slot = currentNotifKey;
                    }

                    // --- BAGIAN 2: NOTIFIKASI HADIAH (WALLET CHECK) ---
                    // Cek setiap detik ke-0 sampai ke-15 saja biar ringan
                    if (now.getSeconds() < 15) { 
                        const rewards = await Store.get('rewards');
                        
                        // Hitung Saldo Real-time
                        const { total } = await Engine.calcPoints(tasks);
                        const settings = await Store.get('settings');
                        const archivedSpent = settings.archivedSpent || 0;
                        
                        const allRedeemed = rewards.filter(r => r.status === 'redeemed');
                        const totalSpent = allRedeemed.reduce((acc, r) => acc + (r.cost || 0), 0) + archivedSpent;
                        const walletBalance = total - totalSpent;

                        // Cari hadiah yang bisa dibeli & belum dinotif
                        const claimableRewards = rewards.filter(r => 
                            r.status === 'active' && 
                            walletBalance >= r.cost &&
                            !this.state.notifiedTracker.rewards.includes(r.id)
                        );

                        if (claimableRewards.length > 0) {
                            const rNames = claimableRewards.map(r => r.name).join(", ");
                            this.showNotification("🎁 REWARD UNLOCKED!", `Saldo cukup untuk: ${rNames}`);
                            this.sound.play('success');
                            
                            // Masukkan ke tracker
                            claimableRewards.forEach(r => this.state.notifiedTracker.rewards.push(r.id));
                        }
                    }
                },
                // Fungsi Helper Baru untuk Memunculkan Notif (Support Service Worker jika ada)
                showNotification(title, body) {
                    const options = {
                        body: body,
                        icon: "https://placehold.co/192x192/020617/06b6d4.png?text=WM",
                        badge: "https://placehold.co/96x96/020617/ffffff.png?text=W", // Icon kecil di status bar android
                        vibrate: [200, 100, 200],
                        tag: "wakemap-alert", // Agar notifikasi tidak menumpuk
                        renotify: true // Agar HP getar lagi walaupun notif lama belum ditutup
                    };

                    // Coba pakai Service Worker (Lebih kuat di Android)
                    if (navigator.serviceWorker && navigator.serviceWorker.ready) {
                        navigator.serviceWorker.ready.then(registration => {
                            registration.showNotification(title, options);
                        });
                    } else {
                        // Fallback ke notifikasi biasa
                        new Notification(title, options);
                    }

            // --- CARI BAGIAN INI DI DALAM Controller ---
                async updateTask(id, status) {
                    const tasks = await Store.get('tasks');
                    const t = tasks.find(x => x.id === id);
                    if (t) {
                        t.status = status;
                        await Store.set('tasks', tasks);
                        
                        if (status === 'completed') {
                            this.sound.play('success');
                            // BAGIAN AUTO-CLAIM YANG LAMA DIHAPUS, DIGANTI JADI SIMPEL SAJA
                        } else {
                            this.sound.play('error');
                        }
                        this.render();
                    }
                },
            async activateRestDay() {
                    const restDays = await Store.get('restDays') || [];
                    const today = Utils.getISO();
                    
                    if(restDays.includes(today)) {
                        this.toast("Rest Day sudah aktif hari ini.", "info"); return;
                    }

                    // 1. Hitung Harga Tiket (1.5x Target Harian)
                    const monthKey = Utils.getMonthKey(today);
                    const financeData = await Store.get('finance');
                    const myFinance = financeData.find(f => f.month === monthKey);
                    const dailyTarget = myFinance ? myFinance.targetPts : 24;
                    const ticketPrice = Math.floor(dailyTarget * 1.5); // Harga Dinamis

                    // 2. Cek Saldo Dompet
                    const tasks = await Store.get('tasks');
                    const rewards = await Store.get('rewards');
                    const settings = await Store.get('settings');
                    
                    const { total } = await Engine.calcPoints(tasks);
                    const archivedSpent = settings.archivedSpent || 0;
                    const allRedeemed = rewards.filter(r => r.status === 'redeemed');
                    const totalSpent = allRedeemed.reduce((acc, r) => acc + (r.cost || 0), 0) + archivedSpent;
                    
                    const walletBalance = total - totalSpent;

                    if (walletBalance < ticketPrice) {
                        this.sound.play('error');
                        this.toast(`Saldo Poin tidak cukup! Butuh ${ticketPrice} PTS untuk Hibernasi.`, 'error');
                        return;
                    }
                    
                    if(confirm(`Beli TIKET HIBERNASI seharga ${ticketPrice} PTS?\n\nSaldo Anda akan dipotong. Misi hari ini akan di-skip (aman), Rank aman, dan Streak tidak putus.`)) {
                        
                        // 3. Potong Saldo (Catat sebagai "pembelian" di tabel rewards)
                        rewards.push({
                            id: Utils.generateId(),
                            name: 'Tiket Hibernasi (Rest Day)',
                            cost: ticketPrice,
                            price: 0,
                            status: 'redeemed',
                            redeemedDate: today
                        });
                        await Store.set('rewards', rewards);

                        // 4. Aktifkan Hibernasi
                        restDays.push(today);
                        await Store.set('restDays', restDays);
                        
                        tasks.forEach(t => {
                            if(t.date === today && t.status === 'pending') t.status = 'rest';
                        });
                        await Store.set('tasks', tasks);
                        
                        this.sound.play('success');
                        this.toast("Mode Hibernasi Aktif! Selamat istirahat.", "success");
                        this.render();
                    }
                },
            async deleteTask(id) {
                    const tasks = await Store.get('tasks');
                    const targetTask = tasks.find(t => t.id === id);
                    
                    if (!targetTask) return;

                    // LOGIKA LOOP PROTOCOL (Sistem Paket)
                    if (targetTask.loopSeriesId) {
                        // Konfirmasi yang lebih jelas
                        if (confirm('⚠️ ABORT PROTOCOL (BATALKAN RANGKAIAN)?\n\nIni akan menghapus semua misi MASA DEPAN dari rangkaian ini. Jackpot akan hangus.\n\nNamun, misi yang SUDAH SELESAI (History) akan tetap tersimpan dan poinnya aman.')) {
                            
                            // Filter Cerdas:
                            // 1. Simpan misi yang BUKAN dari seri ini.
                            // 2. ATAU, Simpan misi dari seri ini TAPI yang statusnya BUKAN 'pending'.
                            const newTasks = tasks.filter(t => {
                                const isDifferentSeries = t.loopSeriesId !== targetTask.loopSeriesId;
                                const isHistory = t.status !== 'pending'; // Completed atau Failed
                                
                                return isDifferentSeries || isHistory;
                            });

                            await Store.set('tasks', newTasks);
                            this.sound.play('click');
                            this.toast('Protocol dihentikan. Poin lama aman.', 'info');
                            this.render();
                        }
                    } 
                    // LOGIKA MISI BIASA (Single)
                    else {
                        // Kalau misi biasa tapi statusnya completed, tanya dulu biar ga sayang poin
                        if (targetTask.status === 'completed') {
                            if(!confirm('Misi ini sudah selesai dan menghasilkan poin. Menghapusnya akan MENGURANGI total poin Anda. Lanjutkan?')) return;
                        }

                        if(confirm('Hapus misi ini?')) {
                            const newTasks = tasks.filter(t => t.id !== id);
                            await Store.set('tasks', newTasks);
                            this.sound.play('click');
                            this.toast('Misi dihapus', 'info');
                            this.render();
                        }
                    }
                },

            async calcRewardRecs() {
                    const priceIn = document.getElementById('rew-price').value;
                    const recContainer = document.getElementById('rec-container');

                    if (!priceIn || priceIn <= 0) {
                        this.state.tempReward.recs = null;
                        if(recContainer) recContainer.innerHTML = '';
                        return;
                    }

                    const financeData = await Store.get('finance');
                    const curMonthKey = Utils.getMonthKey(Utils.getISO());
                    const myFinance = financeData.find(f => f.month === curMonthKey);

                    if (myFinance) {
                        const price = parseInt(priceIn);
                        
                        // 1. Ambil data transaksi bulan ini
                        const rewards = await Store.get('rewards');
                        const redeemedThisMonth = rewards.filter(r => r.status === 'redeemed' && r.redeemedDate && r.redeemedDate.startsWith(curMonthKey));
                        const currentSpent = redeemedThisMonth.reduce((acc, r) => acc + (r.price || 0), 0);

                        // 2. Hitung parameter dompet
                        const budgetRupiah = myFinance.amount * (myFinance.allocation || 0.2);
                        const remainingBudget = Math.max(0, budgetRupiah - currentSpent);
                        const budgetUsedRatio = budgetRupiah > 0 ? currentSpent / budgetRupiah : 1;

                        // 3. MATEMATIKA INFLASI KELANGKAAN (Scarcity Multiplier)
                        // Makin tipis sisa uang lu, makin MAHAL harga poinnya!
                        let scarcityMultiplier = 1.0;
                        let warningText = '';
                        
                        if (budgetUsedRatio > 0.9) {
                            scarcityMultiplier = 3.0; // Sisa uang < 10%, poin dikali 3! (Sangat Mahal)
                            warningText = '<span class="block text-[9px] text-neonRed font-bold mt-2 animate-pulse text-center">⚠️ DANGER: Sisa anggaran menipis! Inflasi Poin 300%.</span>';
                        } else if (budgetUsedRatio > 0.75) {
                            scarcityMultiplier = 2.0; // Sisa uang < 25%, poin dikali 2 (Mahal)
                            warningText = '<span class="block text-[9px] text-neonGold font-bold mt-2 text-center">⚠️ WARNING: Anggaran menipis. Inflasi Poin 200%.</span>';
                        } else if (budgetUsedRatio > 0.5) {
                            scarcityMultiplier = 1.3; // Sisa uang < 50%, poin dikali 1.3 (Sedikit Mahal)
                        }

                        // PROTEKSI HARD BLOCK: Jika harga barang lebih dari sisa dompet!
                        if (price > remainingBudget && remainingBudget > 0) {
                            warningText = `<span class="block text-[9px] text-neonRed font-bold mt-2 text-center">❌ DITOLAK: Harga barang (Rp ${Utils.formatCurrency(price)}) melebihi sisa anggaran (Rp ${Utils.formatCurrency(remainingBudget)}).</span>`;
                            if(recContainer) recContainer.innerHTML = warningText;
                            return; // Hentikan kalkulasi, jangan kasih tombol rekomendasi
                        }

                        // 4. Kalkulasi Base Poin
                        const daysInMonth = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate();
                        const dailyTarget = myFinance.targetPts || 10;
                        const monthlyTargetPts = dailyTarget * daysInMonth;
                        
                        // Harga 1 poin secara normal (Rupiah per Poin)
                        const baseValPerPoint = Math.max(1, Math.round(budgetRupiah / monthlyTargetPts));
                        
                        // 5. Kalkulasi Akhir dengan Inflasi
                        const normalPts = Math.ceil((price / baseValPerPoint) * scarcityMultiplier);
                        const hardPts = Math.ceil(normalPts * 1.5);

                        if (recContainer) {
                            recContainer.innerHTML = `
                            <div class="flex gap-2 mt-2 animate-[fadeIn_0.3s]">
                                <button onclick="App.controller.applyRec(${normalPts})" class="flex-1 bg-surface border border-slate-600 hover:border-neonCyan p-2 rounded-lg text-center transition-all group active:scale-95">
                                    <span class="block text-[9px] text-slate-400 uppercase group-hover:text-white">Normal</span>
                                    <span class="block text-neonCyan font-bold font-mono text-sm">${normalPts} Pts</span>
                                </button>
                                <button onclick="App.controller.applyRec(${hardPts})" class="flex-1 bg-surface border border-slate-600 hover:border-neonPurple p-2 rounded-lg text-center transition-all group active:scale-95">
                                    <span class="block text-[9px] text-slate-400 uppercase group-hover:text-white">Sulit (Hemat)</span>
                                    <span class="block text-neonPurple font-bold font-mono text-sm">${hardPts} Pts</span>
                                </button>
                            </div>
                            ${warningText}`;
                        }
                    } else {
                        if(recContainer) recContainer.innerHTML = `<p class="text-[10px] text-neonRed text-center mt-2">Belum ada data keuangan bulan ini. Cek Menu PETA.</p>`;
                    }
                },
                applyRec(pts) {
                    const costInput = document.getElementById('rew-cost');
                    if (costInput) costInput.value = pts;
                    this.sound.play('click'); 
                },

                async exportData() {
                    this.sound.play('click');

                        tasks: await Store.get('tasks'),
                        rewards: await Store.get('rewards'),
                        achievements: await Store.get('achievements'), 
                        goals: await Store.get('goals'), 
                        blueprints: await Store.get('blueprints'), 
                        reflections: await Store.get('reflections'),
                        finance: await Store.get('finance'),
                        settings: await Store.get('settings')
                    };
                    const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `wakemap_backup_${Utils.getISO()}.json`;
                    a.click();
                    this.toast('Data berhasil di-backup!', 'success');
                },

                importData() {
                    this.sound.play('click');
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = '.json';
                    input.onchange = e => {
                        const file = e.target.files[0];
                        if (!file) return;
                        const reader = new FileReader();
                        reader.onload = async event => {
                            try {
                                const data = JSON.parse(event.target.result);
                                if (data.tasks) await Store.set('tasks', data.tasks);
                                if (data.rewards) await Store.set('rewards', data.rewards);
                                if (data.achievements) await Store.set('achievements', data.achievements); 
                                if (data.goals) await Store.set('goals', data.goals); 
                                if (data.blueprints) await Store.set('blueprints', data.blueprints); 
                                if (data.reflections) await Store.set('reflections', data.reflections);
                                if (data.finance) await Store.set('finance', data.finance);
                                if (data.settings) await Store.set('settings', data.settings);
                                this.sound.play('success');
                                this.toast('Data berhasil dipulihkan!', 'success');
                                setTimeout(() => window.location.reload(), 1000);
                            } catch (err) {
                                this.sound.play('error');
                                this.toast('File backup tidak valid', 'error');
                            }
                        };
                        reader.readAsText(file);
                    };
                    input.click();
                },

            resetTimeSelection() {

            selectTimeSlot(val) {
                    this.sound.play('click');
                    
                    if (val === 'all') {
                        this.state.tempTimeRange = { start: 0, end: 24, isAll: true };
                        this.submitTimeRange();
                        return;
                    }

                    let { start, end } = this.state.tempTimeRange;

                    // PROTEKSI: Angka 24 tidak boleh jadi START
                    if (start === null && val === 24) {
                        this.toast("Jam 24:00 hanya untuk waktu selesai.", "error");
                        return;
                    }

                    // SKENARIO 1: RESET (Jika klik tombol start yang sama)
                    if (start === val && end === null) {
                        this.resetTimeSelection();
                        return;
                    }

                    // SKENARIO 2: PILIH START
                    if (start === null || val < start) {
                        this.state.tempTimeRange = { start: val, end: null }; 
                    } 
                    // SKENARIO 3: PILIH END
                    else if (val > start) {
                        // Logic Normal: Start 00, Klik 01 -> End 01. Durasi 1 Jam.
                        // Logic Akhir: Start 23, Klik 24 -> End 24. Durasi 1 Jam.
                        this.state.tempTimeRange = { start: start, end: val, isAll: false };

           updateTimeGridUI() {
                const range = this.state.tempTimeRange;

                // 👉 FIX: Loop sampai 48 (Total 49 tombol untuk 00:00 sampai 24:00)

                    const btn = document.getElementById(`slot-btn-${i}`);

                    const isLast = i === 48; // 👉 FIX: Batas akhirnya di index 48
                    
                    // Style Default
                    let btnClass = `glass-card p-1 rounded-lg border ${isLast ? 'border-neonRed/30' : 'border-slate-700'} hover:bg-slate-700 text-center transition-all flex flex-col items-center justify-center min-h-[40px] ${isLast ? 'col-span-4 mt-2 bg-slate-800' : ''}`;
                    let textClass = `${isLast ? 'text-neonRed' : 'text-slate-400'} font-mono font-bold text-xs pointer-events-none`;

                    if (range.start !== null) {
                        // TOMBOL START
                        if (i === range.start) {
                            if (range.end === null) {
                                btnClass = "bg-neonGold text-obsidian shadow-[0_0_10px_rgba(245,158,11,0.5)] p-1 rounded-lg border border-neonGold text-center transition-all flex flex-col items-center justify-center min-h-[40px] animate-pulse";

                                textClass = "text-obsidian font-mono font-bold text-xs pointer-events-none";
                            }
                        }
                        // RANGE TENGAH
                        else if (range.end !== null && i > range.start && i < range.end) {
                            btnClass = "bg-neonCyan/20 text-white p-1 rounded-lg border border-neonCyan/50 text-center transition-all flex flex-col items-center justify-center min-h-[40px]";
                            textClass = "text-white font-mono font-bold text-xs pointer-events-none";

                    }

                        timeLabel = `${String(range.start).padStart(2,'0')}:00 - ${String(range.end).padStart(2,'0')}:00`;
                        slotId = `custom`; 
                    }

                    tasks.push({
                        id: Utils.generateId(),
                        text: this.state.tempTask.text,
                        difficulty: this.state.tempTask.difficulty,
                        timeSlot: slotId,
                        // SIMPAN DATA RANGE SPESIFIK
                        customStart: range.start,
                        customEnd: range.end,
                        customLabel: timeLabel,
                        
                        date: Utils.getTomorrow(), 
                        status: 'pending',
                        createdAt: new Date().toISOString()
                    });

                    const currentSlot = Utils.getCurrentSlot();

                },
                logout: async () => {
                    await signOut(auth);
                    if (window.App) window.App.controller.toast("Koneksi Cloud diputus.", 'success');
                },
                syncToCloud: async () => {
                    if (!window.CloudEngine.currentUser) {
                        window.App.controller.toast("Otorisasi Google diperlukan!", "error");
                        return;
                    }
                    try {
                        window.App.controller.toast("Uploading neural data...", "info");
                        const uid = window.CloudEngine.currentUser.uid;
                        
                        // Ambil semua tabel IndexedDB WakeMap
                        const keys = ['tasks', 'rewards', 'achievements', 'goals', 'blueprints', 'reflections', 'finance', 'settings'];
                        const payload = {};
                        for (let k of keys) {
                            payload[k] = await window.Store.get(k);
                        }
                        payload.lastSync = new Date().toISOString();

                        // Simpan ke koleksi khusus 'wakemap_users' biar gak nabrak LifeTracker
                        await setDoc(doc(db, "wakemap_users", uid), payload);
                        window.App.controller.toast("Backup Cloud Berhasil! ✅", "success");
                    } catch (error) {
                        window.App.controller.toast("Upload gagal: " + error.message, "error");
                    }
                },
                syncFromCloud: async () => {
                    if (!window.CloudEngine.currentUser) {
                        window.App.controller.toast("Otorisasi Google diperlukan!", "error");
                        return;
                    }
                    if(confirm("Tarik data dari Cloud?\nPeringatan: Ini akan me-reset data di device ini sesuai Cloud.")) {
                        try {
                            window.App.controller.toast("Downloading neural data...", "info");
                            const uid = window.CloudEngine.currentUser.uid;
                            const docSnap = await getDoc(doc(db, "wakemap_users", uid));

                            if (docSnap.exists()) {
                                const data = docSnap.data();
                                const keys = ['tasks', 'rewards', 'achievements', 'goals', 'blueprints', 'reflections', 'finance', 'settings'];
                                
                                for (let k of keys) {
                                    if(data[k]) await window.Store.set(k, data[k]);
                                }

                                window.App.controller.toast("Restore sukses! Sistem Reboot...", "success");
                                setTimeout(() => window.location.reload(), 1500);
                            } else {
                                window.App.controller.toast("Belum ada backup WakeMap di Cloud.", "error");
                            }
                        } catch (error) {
                            window.App.controller.toast("Download gagal: " + error.message, "error");
                        }
                    }
                },
        
            };

            onAuthStateChanged(auth, (user) => {
                window.CloudEngine.currentUser = user;
                
                // Ubah Header Keren Wake Map (Dari TAP TO RELOAD jadi tulisan Auth)
                const headerStatus = document.getElementById('header-status');
                if (headerStatus) {
                    headerStatus.innerText = user ? `AUTH: ${user.email.split('@')[0].toUpperCase()}` : 'TAP TO RELOAD';
                }

                // Auto-refresh Setting UI kalau lagi dibuka
                const m = document.getElementById('modal-layer');
                if (m && !m.classList.contains('opacity-0') && m.innerHTML.includes('Pengaturan')) {
                    if (window.App) window.App.controller.openSettings();
                }
            });

        </script>
    </body>
    </html>
